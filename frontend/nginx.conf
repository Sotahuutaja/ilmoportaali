server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass https://ilmoportaali-app.graysand-8ea0ea6e.swedencentral.azurecontainerapps.io;
        proxy_set_header Host ilmoportaali-app.graysand-8ea0ea6e.swedencentral.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
}