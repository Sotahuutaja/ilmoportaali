name: Build and Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:  # Allow manual trigger

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  build-deploy-backend-staging:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend to staging
        uses: azure/cli@v1
        with:
          inlineScript: |
            SUFFIX=$(date +%Y%m%d%H%M%S)
            az containerapp update \
              --name ilmoportaali-app-staging \
              --resource-group RG_Ilmoportaali \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend:staging \
              --revision-suffix $SUFFIX

      - name: Health check backend staging
        run: |
          echo "Waiting for staging backend to become healthy..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ilmoportaali-app-staging.graysand-8ea0ea6e.swedencentral.azurecontainerapps.io/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging backend is healthy."
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Warning: Staging backend health check did not complete, but deployment continues."

  build-deploy-frontend-staging:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/frontend:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy frontend to staging
        uses: azure/cli@v1
        with:
          inlineScript: |
            SUFFIX=$(date +%Y%m%d%H%M%S)
            az containerapp update \
              --name ilmoportaali-frontend-staging \
              --resource-group RG_Ilmoportaali \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/frontend:staging \
              --revision-suffix $SUFFIX

      - name: Health check frontend staging
        run: |
          echo "Waiting for staging frontend to become healthy..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ilmoportaali-frontend-staging.graysand-8ea0ea6e.swedencentral.azurecontainerapps.io || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging frontend is healthy."
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Warning: Staging frontend health check did not complete, but deployment continues."
