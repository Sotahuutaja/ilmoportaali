name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  build-deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend
        uses: azure/cli@v1
        with:
          azcliversion: latest
          inlineScript: |
            SUFFIX=$(date +%Y%m%d%H%M%S)
            az containerapp update \
              --name ilmoportaali-app \
              --resource-group RG_Ilmoportaali \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend:latest \
              --revision-suffix $SUFFIX

      - name: Health check backend
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ilmoportaali-app.graysand-8ea0ea6e.swedencentral.azurecontainerapps.io/health)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy."
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Backend did not become healthy after 2 minutes."
          exit 1

  build-deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy frontend
        uses: azure/cli@v1
        with:
          azcliversion: latest
          inlineScript: |
            SUFFIX=$(date +%Y%m%d%H%M%S)
            az containerapp update \
              --name ilmoportaali-frontend \
              --resource-group RG_Ilmoportaali \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/frontend:latest \
              --revision-suffix $SUFFIX

      - name: Health check frontend
        run: |
          echo "Waiting for frontend to become healthy..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ilmoportaali-frontend.graysand-8ea0ea6e.swedencentral.azurecontainerapps.io)
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is healthy."
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Frontend did not become healthy after 2 minutes."
          exit 1
