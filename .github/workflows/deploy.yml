name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mywebsite_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for database
        run: |
          until PGPASSWORD=postgres psql -h localhost -U postgres -d mywebsite_test -c '\q'; do
            echo 'Waiting for database...'
            sleep 2
          done

      - name: Run database migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mywebsite_test
        run: timeout 30 node src/initPaymentSchema.js || echo "Migration completed or timed out"

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mywebsite_test
        run: npm test

  build-deploy-backend:
    needs: [changes, test-backend]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend
        run: |
          SUFFIX=$(date +%Y%m%d%H%M%S)
          az containerapp update \
            --name ilmoportaali-app \
            --resource-group RG_Ilmoportaali \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend:latest \
            --revision-suffix $SUFFIX

      # - name: Health check backend
      #   run: |
      #     echo "Waiting for backend to become healthy..."
      #     for i in $(seq 1 24); do
      #       STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ilmoportaali-app.graysand-8ea0ea6e.swedencentral.azurecontainerapps.io/health)
      #       if [ "$STATUS" = "200" ]; then
      #         echo "Backend is healthy."
      #         exit 0
      #       fi
      #       echo "Attempt $i: got $STATUS, retrying in 5s..."
      #       sleep 5
      #     done
      #     echo "Backend did not become healthy after 2 minutes."
      #     exit 1

  build-deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/frontend:latest
          build-args: |
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            VITE_STRIPE_PUBLISHABLE_KEY_TEST=${{ secrets.STRIPE_PUBLISHABLE_KEY_TEST }}
          no-cache: true

      - name: Deploy frontend
        run: |
          SUFFIX=$(date +%Y%m%d%H%M%S)
          az containerapp update \
            --name ilmoportaali-frontend \
            --resource-group RG_Ilmoportaali \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/frontend:latest \
            --revision-suffix $SUFFIX

      - name: Health check frontend
        run: |
          echo "Waiting for frontend to become healthy..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ilmoportaali-frontend.graysand-8ea0ea6e.swedencentral.azurecontainerapps.io)
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is healthy."
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Frontend did not become healthy after 2 minutes."
          exit 1
