name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ilmoportaaliregistry
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/frontend:latest

      - name: Deploy backend
        uses: azure/cli@v1
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ilmoportaali-app \
              --resource-group RG_Ilmoportaali \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend:latest

      - name: Deploy frontend
        uses: azure/cli@v1
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ilmoportaali-frontend \
              --resource-group RG_Ilmoportaali \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/frontend:latest